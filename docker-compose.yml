services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgres://leeral_user:leeral_password@db:5432/leeral_db
      - JWT_SECRET=change_me_in_production_secret_key
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: leeral_user
      POSTGRES_PASSWORD: leeral_password
      POSTGRES_DB: leeral_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
    driver: local
